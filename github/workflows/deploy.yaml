name: Deploy Quartz site to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: quartz/package-lock.json

      # Quartz expects content at quartz/content on the runner.
      # Your notes are in repo root /content, so copy them in at build time.
      - name: Sync content into Quartz
        run: |
          rm -rf quartz/content
          mkdir -p quartz/content
          cp -R content/. quartz/content/

      - name: Install dependencies (Quartz)
        working-directory: quartz
        run: npm ci

      # For Quartz v4, build is typically via the CLI.
      # If `npm run build` exists in your submodule, you can keep it,
      # but this is the safest/up-to-date command:
      - name: Build site (Quartz)
        working-directory: quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
